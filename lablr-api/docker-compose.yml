services:
  lablr-api:
    # Build context is the repo root so the image can build both the API and the PWA.
    build:
      context: ..
      dockerfile: lablr-api/Dockerfile
    container_name: lablr-api
    restart: unless-stopped
    networks:
      - ingress-network
    expose:
      - 8080
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Cors__AllowedOrigins__0: https://${LABLR_UI_DOMAIN}
      # Config is read from a mounted directory (edit without rebuilding).
      Config__Dir: /config
      # The PWA is served by this container (wwwroot), so deep-link URLs are
      # derived from the forwarded request host. Set App__PublicBaseUrl only to
      # override (e.g. if the public domain differs from the routed host).
      # App__PublicBaseUrl: https://${LABLR_UI_DOMAIN}
      # Oidc__Authority: https://${AUTHENTIK_DOMAIN}/application/o/lablr/
      # Oidc__ClientId: ${LABLR_OIDC_CLIENT_ID}
      # Oidc__ClientSecret: ${LABLR_OIDC_CLIENT_SECRET}
    volumes:
      - ${LABLR_CONFIG_DIR}:/config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lablr-api.rule=Host(`${LABLR_API_DOMAIN}`)"
      - "traefik.http.routers.lablr-api.entrypoints=websecure"
      - "traefik.http.routers.lablr-api.tls.certresolver=myresolver"
      - "traefik.http.services.lablr-api.loadbalancer.server.port=8080"

networks:
  ingress-network:
    name: ingress-network
    external: true
