# Named symbols → image asset (under label-config/pictograms/).
# Drafts reference these by name, e.g. `pictogram1: flammable`.
#
# ghs01–ghs09 are the official public-domain UN GHS pictograms
# (source: Wikimedia Commons). The red diamond prints black on the 1-bit
# thermal head; the preview shows the proper red/black artwork.

pictograms:

  explosive:
    image: ghs01.svg

  flammable:
    image: ghs02.svg

  oxidizing:
    image: ghs03.svg

  compressed-gas:
    image: ghs04.svg

  corrosive:
    image: ghs05.svg

  toxic:
    image: ghs06.svg

  irritant:
    image: ghs07.svg

  health-hazard:
    image: ghs08.svg

  environmental-hazard:
    image: ghs09.svg

  # Non-GHS custom symbols (placeholder artwork).
  food-safe:
    image: food-safe.svg

  drinking-water:
    image: water.svg
