# Large chemical label — e.g. a bucket. Pure percentage layout, adapts to any media.
id: chemical-large
name: Chemical — large (bucket)

fields:
  name:
    required: true
    label: Name
  formula:
    required: true
    label: Formula
  hazard:
    required: false
    label: Hazard

elements:
  - type: text
    field: name
    rect: { x: "5%", y: "5%", width: "90%", height: "15%" }
    align: center
    valign: center
    font:
      maxSize: 12
      minSize: 6
      weight: bold
    wrap: true
    maxLines: 2
    fit: shrink

  - type: text
    field: formula
    rect: { x: "5%", y: "24%", width: "90%", height: "36%" }
    align: center
    valign: center
    font:
      maxSize: 28
      minSize: 8
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: hazard
    rect: { x: "5%", y: "61%", width: "90%", height: "16%" }
    align: center
    valign: center
    font:
      maxSize: 8
      minSize: 3
    wrap: true
    maxLines: 2
    fit: shrink
