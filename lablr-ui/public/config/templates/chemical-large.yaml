# Large chemical label — e.g. a bucket. Same draft data as the small one,
# bigger media + layout. Proves draft ⟂ template (one draft, many outputs).
id: chemical-large
name: Chemical — large (bucket)
size: { w: 54, h: 70 } # mm — fills the 54×70 roll

fields:
  - { key: name, label: Name }
  - { key: formula, label: Formula }
  - { key: hazard, label: Hazard }

layout:
  type: stack
  direction: vertical
  align: center
  gap: 8
  children:
    - { type: text, field: name, size: 6, weight: bold }
    - { type: text, field: formula, size: 16, weight: bold }
    - { type: text, field: hazard, size: 4 }
