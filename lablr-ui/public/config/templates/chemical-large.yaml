# Large chemical label — e.g. a bucket. Same field schema as chemical-small,
# different layout for larger media. Proves the same draft can render to
# multiple outputs via different presets (Vial vs Bucket).
id: chemical-large
name: Chemical — large (bucket)
designSize: { width: 108, height: 140 } # mm — canvas during design

fields:
  name:
    required: true
    label: Name
  formula:
    required: true
    label: Formula
  hazard:
    required: false
    label: Hazard

elements:
  - type: text
    field: name
    rect: { x: 4, y: 8, width: 100, height: 20 }
    align: center
    valign: center
    font:
      maxSize: 12
      minSize: 6
      weight: bold
    wrap: true
    maxLines: 2
    fit: shrink

  - type: text
    field: formula
    rect: { x: 4, y: 32, width: 100, height: 50 }
    align: center
    valign: center
    font:
      maxSize: 28
      minSize: 12
      weight: bold
    wrap: true
    maxLines: 3
    fit: shrink

  - type: text
    field: hazard
    rect: { x: 4, y: 85, width: 100, height: 20 }
    align: center
    valign: center
    font:
      maxSize: 8
      minSize: 3
    wrap: true
    maxLines: 2
    fit: shrink
