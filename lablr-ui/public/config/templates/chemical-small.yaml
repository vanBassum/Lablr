# Chemical label — e.g. a vial. Pure percentage layout, adapts to any media.
id: chemical-small
name: Chemical — small (vial)

fields:
  name:
    required: true
    label: Name
  formula:
    required: true
    label: Formula
  hazard:
    required: false
    label: Hazard

elements:
  - type: text
    field: name
    rect: { x: "5%", y: "8%", width: "90%", height: "32%" }
    align: center
    valign: center
    font:
      maxSize: 3
      minSize: 1.5
      weight: bold
    wrap: true
    maxLines: 2
    fit: shrink

  - type: text
    field: formula
    rect: { x: "5%", y: "45%", width: "90%", height: "30%" }
    align: center
    valign: center
    font:
      maxSize: 5
      minSize: 1.5
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: hazard
    rect: { x: "5%", y: "80%", width: "90%", height: "18%" }
    align: center
    valign: center
    font:
      maxSize: 2
      minSize: 1
    wrap: true
    maxLines: 1
    fit: shrink
