# Small chemical label — e.g. a vial.
id: chemical-small
name: Chemical — small (vial)
designSize: { width: 50, height: 20 } # mm — canvas during design

fields:
  name:
    required: true
    label: Name
  formula:
    required: true
    label: Formula
  hazard:
    required: false
    label: Hazard

elements:
  - type: text
    field: name
    rect: { x: 1, y: 2, width: 48, height: 6 }
    align: center
    valign: center
    font:
      maxSize: 4
      minSize: 2
      weight: bold
    wrap: true
    maxLines: 2
    fit: shrink

  - type: text
    field: formula
    rect: { x: 1, y: 9, width: 48, height: 6 }
    align: center
    valign: center
    font:
      maxSize: 5
      minSize: 2
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: hazard
    rect: { x: 1, y: 16, width: 48, height: 4 }
    align: center
    valign: center
    font:
      maxSize: 2
      minSize: 1
    wrap: true
    maxLines: 1
    fit: shrink
