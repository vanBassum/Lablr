# First template (roadmap item 9), declared in YAML.
# All numbers are millimetres; layout is centered on the label center (0,0).
id: smd-basic
name: SMD / through-hole part
size: { w: 25, h: 25 } # mm — designed for the 25mm square (S0929120)

# The field schema. THIS is what decides which values a draft must supply.
fields:
  - { key: name, label: Part }
  - { key: subtitle, label: Description }
  - { key: package, label: Package }

# Declarative layout. A text node binds to a field via `field`, or holds a
# literal via `text`. `size` is cap height in mm.
layout:
  type: stack
  direction: vertical
  align: center
  gap: 1.2
  children:
    - { type: text, field: name, size: 4.5, weight: bold }
    - { type: text, field: subtitle, size: 1.8 }
    - { type: text, field: package, size: 2.6 }
