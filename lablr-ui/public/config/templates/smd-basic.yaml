# Template — declarative label layout. Defines field schema + rendering instructions.
# This template is RESPONSIVE: no designSize means it adapts to the media it's printed on.
# Coordinates use percentage (e.g., "5%" = 5% of media width/height).
id: smd-basic
name: SMD / through-hole part

# Field schema. Defines which fields a draft must supply to use this template.
fields:
  name:
    required: true
    label: Part
  subtitle:
    required: false
    label: Description
  package:
    required: false
    label: Package

# Responsive elements — percentages scale to fit any media size.
# x/y/width/height can be "5%" (percent of media) or "5" (mm, for non-responsive templates).
elements:
  - type: text
    field: name
    rect: { x: "5%", y: "10%", width: "90%", height: "35%" }
    align: center
    valign: center
    font:
      maxSize: 5
      minSize: 2
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: package
    rect: { x: "5%", y: "50%", width: "90%", height: "25%" }
    align: center
    valign: center
    font:
      maxSize: 3
      minSize: 1.5
    wrap: false
    fit: shrink

  - type: text
    field: subtitle
    rect: { x: "5%", y: "77%", width: "90%", height: "18%" }
    align: center
    valign: center
    font:
      maxSize: 2
      minSize: 1
    wrap: true
    maxLines: 1
    fit: shrink
