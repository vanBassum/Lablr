# Template — declarative label layout. Defines field schema + rendering instructions.
# All coordinates are millimetres. Design size is the coordinate system for layout;
# physical output size is determined by the preset's media, not the template.
id: smd-basic
name: SMD / through-hole part
designSize: { width: 50, height: 20 } # mm — canvas used during design

# Field schema. Defines which fields a draft must supply to use this template.
fields:
  name:
    required: true
    label: Part
  subtitle:
    required: false
    label: Description
  package:
    required: false
    label: Package

# Rectangular elements. Each text element lives in an explicit rect.
# The renderer auto-fits text to fit inside the rectangle.
elements:
  - type: text
    field: name
    rect: { x: 1, y: 1, width: 48, height: 8 }
    align: center
    valign: center
    font:
      maxSize: 5
      minSize: 2
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: package
    rect: { x: 1, y: 10, width: 48, height: 6 }
    align: center
    valign: center
    font:
      maxSize: 3
      minSize: 1.5
    wrap: false
    fit: shrink

  - type: text
    field: subtitle
    rect: { x: 1, y: 17, width: 48, height: 3 }
    align: center
    valign: center
    font:
      maxSize: 2
      minSize: 1
    wrap: true
    maxLines: 1
    fit: shrink
