# Template — declarative label layout. Pure layout, adapts to any media.
# All coordinates are percentages of media width/height.
id: smd-basic
name: SMD / through-hole part

fields:
  name:
    required: true
    label: Part
  subtitle:
    required: false
    label: Description
  package:
    required: false
    label: Package

elements:
  - type: text
    field: name
    rect: { x: "5%", y: "10%", width: "90%", height: "35%" }
    align: center
    valign: center
    font:
      maxSize: 5
      minSize: 2
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: package
    rect: { x: "5%", y: "50%", width: "90%", height: "25%" }
    align: center
    valign: center
    font:
      maxSize: 3
      minSize: 1.5
    wrap: false
    fit: shrink

  - type: text
    field: subtitle
    rect: { x: "5%", y: "77%", width: "90%", height: "18%" }
    align: center
    valign: center
    font:
      maxSize: 2
      minSize: 1
    wrap: true
    maxLines: 1
    fit: shrink
