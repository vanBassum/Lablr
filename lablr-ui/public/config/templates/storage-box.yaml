# Storage box label. Pure percentage layout, adapts to any media.
id: storage-box
name: Storage box

fields:
  code:
    required: true
    label: Bin code
  contents:
    required: true
    label: Contents

elements:
  - type: text
    field: code
    rect: { x: "5%", y: "8%", width: "90%", height: "48%" }
    align: center
    valign: center
    font:
      maxSize: 10
      minSize: 5
      weight: bold
    wrap: false
    fit: shrink

  - type: text
    field: contents
    rect: { x: "5%", y: "60%", width: "90%", height: "32%" }
    align: center
    valign: center
    font:
      maxSize: 3
      minSize: 1.5
    wrap: true
    maxLines: 2
    fit: shrink
