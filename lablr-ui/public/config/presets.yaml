# Vial + Bucket + Chem-resistant).
- { id: chemical-vial, name: Vial, template: chemical-small, media: s0929120 }
- { id: chemical-bucket, name: Bucket, template: chemical-large, media: dymo-54x70, orientation: landscape }
- { id: chemical-resistant, name: Chem-resistant, template: chemical-large, media: chem-resistant, orientation: landscape }
- { id: smd, name: SMD label, template: smd-basic, media: s0929120 }
- { id: storage, name: Storage box, template: storage-box, media: s0929120 }
