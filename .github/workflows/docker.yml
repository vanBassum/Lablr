name: Build & publish Docker image

# Publishes the lablr-api image (which also bundles the built PWA) to GHCR on a
# version tag, e.g. `git tag v1.2.0 && git push --tags`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # On a vX.Y.Z tag: publishes X.Y.Z, X.Y, and (highest semver) latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          # Repo root is the build context (matches docker-compose); builds both apps.
          context: .
          file: lablr-api/Dockerfile
          push: true
          # Add linux/arm64 here if the homelab is ARM.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
